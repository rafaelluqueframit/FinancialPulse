<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" width="200" height="50">
  <defs>
    <linearGradient id="gradWhite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D1D5DB"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Icono: velas y pulso (colores claros) -->
  <g transform="translate(20, 20) scale(0.9)">
    <!-- Vela alcista (verde) -->
    <rect x="0" y="18" width="8" height="24" fill="url(#gradGreen)" rx="1"/>
    <line x1="4" y1="12" x2="4" y2="18" stroke="#34D399" stroke-width="2"/>
    <line x1="4" y1="42" x2="4" y2="48" stroke="#34D399" stroke-width="2"/>

    <!-- Vela bajista (rojo claro) -->
    <rect x="20" y="30" width="8" height="12" fill="#F87171" rx="1"/>
    <line x1="24" y1="26" x2="24" y2="30" stroke="#F87171" stroke-width="2"/>
    <line x1="24" y1="42" x2="24" y2="48" stroke="#F87171" stroke-width="2"/>

    <!-- Vela grande (blanco/azul) -->
    <rect x="40" y="8" width="10" height="36" fill="#E0E7FF" rx="2"/>
    <line x1="45" y1="2" x2="45" y2="8" stroke="#A5B4FC" stroke-width="2"/>
    <line x1="45" y1="44" x2="45" y2="52" stroke="#A5B4FC" stroke-width="2"/>

    <!-- Línea de pulso dorada -->
    <polyline points="55,30 65,30 68,20 72,40 76,30 85,30"
              fill="none" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Punto brillante -->
    <circle cx="85" cy="30" r="3" fill="#FBBF24">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Texto: FinancialPulse en blanco -->
  <text x="100" y="55" font-family="'Inter', 'Poppins', sans-serif" font-weight="800" font-size="36" fill="white" letter-spacing="-0.5">
    Financial
  </text>
  <text x="270" y="55" font-family="'Inter', 'Poppins', sans-serif" font-weight="500" font-size="36" fill="#94A3B8" letter-spacing="-0.5">
    Pulse
  </text>

  <!-- Línea inferior tenue -->
  <line x1="95" y1="70" x2="380" y2="70" stroke="#374151" stroke-width="1.5"/>
</svg>