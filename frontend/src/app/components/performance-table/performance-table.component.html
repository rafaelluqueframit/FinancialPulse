<div class="mt-8 bg-white p-4 rounded shadow">
  <h4 class="text-lg font-semibold mb-4">{{ 'RENDIMIENTO_POR_PERIODO' | translate }}</h4>
  <table class="min-w-full">
    <thead class="bg-gray-100">
      <tr>
        <th class="px-4 py-2 text-left">{{ 'PERIODO' | translate }}</th>
        <th class="px-4 py-2 text-right">{{ 'RENDIMIENTO' | translate }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of performanceData" class="border-t">
        <td class="px-4 py-2">{{ item.label }}</td>
        <td class="px-4 py-2 text-right"
            [ngClass]="{
              'text-green-600': item.rendimiento && item.rendimiento > 0,
              'text-red-600': item.rendimiento && item.rendimiento < 0
            }">
          {{ item.rendimiento !== null ? (item.rendimiento | number:'1.2-2') + '%' : 'N/A' }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
