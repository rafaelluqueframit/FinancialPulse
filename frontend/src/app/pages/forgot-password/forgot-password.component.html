<div class="p-4 max-w-md mx-auto">
  <h2 class="text-2xl font-bold mb-4">{{ 'RECUPERAR_CONTRASENA' | translate }}</h2>

  <div *ngIf="message" class="bg-green-100 text-green-700 p-2 rounded mb-4">{{ message }}</div>
  <div *ngIf="error" class="bg-red-100 text-red-700 p-2 rounded mb-4">{{ error }}</div>

  <div *ngIf="step === 1">
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'EMAIL' | translate }}</label>
      <input type="email" [(ngModel)]="email" class="w-full border p-2 rounded" required>
    </div>
    <button (click)="requestCode()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
      {{ 'ENVIAR_CODIGO' | translate }}
    </button>
    <p class="mt-4 text-center">
      <a routerLink="/login" class="text-blue-600">{{ 'VOLVER' | translate }}</a>
    </p>
  </div>

  <div *ngIf="step === 2">
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'CODIGO_VERIFICACION' | translate }}</label>
      <input type="text" [(ngModel)]="code" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'NUEVA_CONTRASENA' | translate }}</label>
      <input type="password" [(ngModel)]="newPassword" class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'CONFIRMAR_CONTRASENA' | translate }}</label>
      <input type="password" [(ngModel)]="confirmPassword" class="w-full border p-2 rounded" required>
    </div>
    <button (click)="resetPassword()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
      {{ 'CAMBIAR_CONTRASENA' | translate }}
    </button>
  </div>
</div>
