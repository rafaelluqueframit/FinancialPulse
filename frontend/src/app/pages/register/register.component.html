<div class="p-4 max-w-md mx-auto">
  <h2 class="text-2xl font-bold mb-4">{{ 'REGISTRARSE' | translate }}</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'NOMBRE' | translate }}</label>
      <input type="text" [(ngModel)]="nombre" name="nombre" 
             [placeholder]="'REGISTER_NAME_PLACEHOLDER' | translate"
             class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'EMAIL' | translate }}</label>
      <input type="email" [(ngModel)]="email" name="email"
             [placeholder]="'REGISTER_EMAIL_PLACEHOLDER' | translate"
             class="w-full border p-2 rounded" required>
    </div>
    <div class="mb-4">
      <label class="block text-gray-700">{{ 'CONTRASENA' | translate }}</label>
      <input type="password" [(ngModel)]="password" name="password"
             [placeholder]="'REGISTER_PASSWORD_PLACEHOLDER' | translate"
             class="w-full border p-2 rounded" required>
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
      {{ 'REGISTRARSE' | translate }}
    </button>
    <p class="mt-4 text-center">
      {{ 'YA_TIENES_CUENTA' | translate }} 
      <a routerLink="/login" class="text-blue-600">{{ 'INICIAR_SESION' | translate }}</a>
    </p>
  </form>

  <div *ngIf="successMessage" class="mt-4 p-2 bg-green-100 text-green-700 rounded">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="mt-4 p-2 bg-red-100 text-red-700 rounded">
    {{ errorMessage }}
  </div>
</div>
